<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Typst Math Converter Tests</title>
    <style>
      body {
        color: #18212f;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 2rem;
      }

      .pass {
        color: #116329;
      }

      .fail {
        color: #b42318;
      }

      pre {
        background: #f6f8fb;
        border-radius: 0.5rem;
        padding: 0.75rem;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>Typst Math Converter Tests</h1>
    <div id="summary"></div>
    <pre id="results"></pre>

    <script src="./typst-math.js"></script>
    <script>
      const tests = [
        ["x^2", "x^{2}"],
        ["a_i", "a_{i}"],
        ["sqrt(x + 1)", "\\sqrt{x + 1}"],
        ["frac(a, b)", "\\frac{a}{b}"],
        ["alpha + beta", "\\alpha + \\beta"],
        ["sin(theta)", "\\sin (\\theta)"],
        ["(a + b)", "\\left(a + b\\right)"],
        ["[x, y]", "\\left[x, y\\right]"],
        ["sum_(i = 1)^n i", "\\sum_{i = 1}^{n} i"],
        ["frac(sqrt(x), y_1)", "\\frac{\\sqrt{x}}{y_{1}}"],
        ["0", "0"],
        ["x <= y != z >= 0", "x \\le y \\ne z \\ge 0"],
        ["a / b", "\\frac{a}{b}"],
        ["a / b / c", "\\frac{\\frac{a}{b}}{c}"],
        ["a / (b / c)", "\\frac{a}{\\frac{b}{c}}"],
        ["(1 / (1+x)^2)", "\\left(\\frac{1}{\\left(1 + x\\right)^{2}}\\right)"],
        ["f' + f''", "f^{\\prime} + f^{\\prime\\prime}"],
        ["x_1^2", "x_{1}^{2}"],
        ["x^2_1", "x_{1}^{2}"],
        ["ŌłÜx + Ōłøy + Ōł£(a + b)", "\\sqrt{x} + \\sqrt[3]{y} + \\sqrt[4]{a + b}"],
        ["root(3, x) + sqrt(x)", "\\sqrt[3]{x} + \\sqrt{x}"],
        ["phi.alt + plus.minus + arrow.r", "\\varphi + \\pm + \\rightarrow"],
        ["sym.arrow.r + #sym.arrow.l", "\\rightarrow + \\leftarrow"],
        ["aleph + beta.alt + kappa.alt", "\\text{ūÉ} + \\text{ŽÉ} + \\text{Ž░}"],
        ["arrow.r.double.long.bar + arrow.l.long.squiggly", "\\text{Ō¤Š} + \\text{Ō¼│}"],
        ["AA + BB + angle.l.double + angle.r.double", "\\text{­ØöĖ} + \\text{­Øö╣} + \\text{Ō¤¬} + \\text{Ō¤½}"],
        ["dif x + Dif x", "\\mathrm{d} x + \\mathrm{D} x"],
        ["a -> b |-> c ...", "a \\to b \\mapsto c \\ldots"],
        ["a <~~ b", "a \\text{Ō¼│} b"],
        ["a := b <==> c || d", "a \\coloneqq b \\Longleftrightarrow c \\Vert d"],
        ["[|x|] << y >>> z", "\\llbracket x \\rrbracket \\ll y \\ggg z"],
        ["x Ōēż y Ōēź z ŌēĀ 0 Ōłæ_i^n i + Ōł×", "x \\le y \\ge z \\ne 0 \\sum_{i}^{n} i + \\infty"],
        ["Ōåö’ĖÄ + Ō¼ø’ĖÄ + Ōśæ’ĖÄ", "\\text{Ōåö’ĖÄ} + \\text{Ō¼ø’ĖÄ} + \\text{Ōśæ’ĖÄ}"],
        ["Ōåö’ĖÄ_x", "\\text{Ōåö’ĖÄ}_{x}"],
        ["A subset B subset.eq C subset.neq D subset.not E", "A \\subset B \\subseteq C \\subsetneq D \\nsubset E"],
        ["A supset B supset.eq C supset.neq D supset.not E", "A \\supset B \\supseteq C \\supsetneq D \\nsupset E"],
        ["x in.not A and y in.rev B or not z", "x \\notin A \\land y \\ni B \\lor \\lnot z"],
        ["emptyset union.big A sect.big B without C", "\\emptyset \\bigcup A \\bigcap B \\setminus C"],
        ["forall x exists y exists.not z therefore because", "\\forall x \\exists y \\nexists z \\therefore \\because"],
        ["l parallel m parallel.not n perp p prop q divides r divides.not s", "l \\parallel m \\nparallel n \\perp p \\propto q \\mid r \\nmid s"],
        ["a prec b prec.eq c succ d succ.eq e", "a \\prec b \\preceq c \\succ d \\succeq e"],
        ["Gamma tack.r phi and Gamma tack.r.not phi", "\\Gamma \\vdash \\phi \\land \\Gamma \\nvdash \\phi"],
        ["Gamma tack.r.double phi and Gamma tack.r.double.not phi", "\\Gamma \\vDash \\phi \\land \\Gamma \\nvDash \\phi"],
        ["A tack.l B tack.l.double C models D forces E forces.not F", "A \\dashv B \\Dashv C \\models D \\Vdash E \\nVdash F"],
        ["bot top tack.t tack.b tack.t.double tack.b.double", "\\bot \\top \\bot \\top \\Vbar \\barV"],
        ["ŌŖó ŌŖ¼ ŌŖ© ŌŖŁ ŌŖŻ Ō½ż ŌŖ® ŌŖ« ŌŖź ŌŖż", "\\vdash \\nvdash \\vDash \\nvDash \\dashv \\Dashv \\Vdash \\nVdash \\bot \\top"],
        ["ŌŖé ŌŖå ŌŖŖ ŌŖä ŌŖā ŌŖć ŌŖŗ ŌŖģ Ōłē Ōłģ ŌłĆ Ōłā Ōłä", "\\subset \\subseteq \\subsetneq \\nsubset \\supset \\supseteq \\supsetneq \\nsupset \\notin \\emptyset \\forall \\exists \\nexists"],
        ["binom(n, k)", "\\binom{n}{k}"],
        ["vec(1, 2, 3)", "\\begin{pmatrix} 1 \\\\ 2 \\\\ 3 \\end{pmatrix}"],
        ["mat(1, 2; 3, 4)", "\\begin{pmatrix} 1 & 2 \\\\ 3 & 4 \\end{pmatrix}"],
        ["cases(x < 0, -1; x >= 0, 1)", "\\begin{cases} x < 0 & - 1 \\\\ x \\ge 0 & 1 \\end{cases}"],
        ["hat(x) + bar(y) + tilde(z) + dot(a) + underline(b) + overline(c)", "\\hat{x} + \\bar{y} + \\tilde{z} + \\dot{a} + \\underline{b} + \\overline{c}"],
        ["op(\"lim\")_x", "\\operatorname{lim}_{x}"],
        ["underover(arrow.r, below, above)", "\\overset{above}{\\underset{below}{\\rightarrow}}"],
        ["sin(theta) + ln(x)", "\\sin (\\theta) + \\ln (x)"],
        ["abs(x / 2) + norm(v)", "\\left|\\frac{x}{2}\\right| + \\left\\|v\\right\\|"],
        ["ceil(x) + floor(y) + round(z)", "\\left\\lceil x\\right\\rceil + \\left\\lfloor y\\right\\rfloor + \\left\\lfloor z\\right\\rceil"],
        ["bold(x) + italic(y) + upright(z) + sans(A)", "\\mathbf{x} + \\mathit{y} + \\mathrm{z} + \\mathsf{A}"],
        ["frak(g) + mono(m) + bb(N) + cal(C) + scr(L)", "\\mathfrak{g} + \\mathtt{m} + \\mathbb{N} + \\mathcal{C} + \\mathscr{L}"],
        ["det(A) + gcd(a) + limsup x + arcsin(y)", "\\det (A) + \\gcd (a) + \\limsup x + \\arcsin (y)"],
        ["f(x) + floor(x)", "f \\left(x\\right) + \\left\\lfloor x\\right\\rfloor"],
        ["a = b\nc &= d", "\\begin{aligned} & a = b \\\\ c & = d \\end{aligned}"],
        ["1 + 2\n3 + 4", "\\begin{gathered} 1 + 2 \\\\ 3 + 4 \\end{gathered}"],
        ["x &= (-b plus.minus sqrt(b^2 - 4 a c))/(2a)", "\\begin{aligned} x & = \\frac{- b \\pm \\sqrt{b^{2} - 4 a c}}{2 a} \\end{aligned}"],
        ["a + sqrt(,) + b", "a + \\text{sqrt(,)} + b"],
        ["#x + y", "\\text{\\#x} + y"],
        ["mat(..xs) + 1", "\\text{mat(..xs)} + 1"],
        ["sqrt(x, size: #50%)", "\\text{sqrt(x, size: \\#50\\%)}"],
        ["vec(1, delim: \"[\")", "\\text{vec(1, delim: \"[\")}"],
        ["op(\"a_b\")", "\\text{op(\"a\\_b\")}"],
      ];

      const errorTests = [
      ];

      const lines = [];
      let failures = 0;

      for (const [input, expected] of tests) {
        try {
          const actual = typstMathToLatex(input);
          const passed = actual === expected;

          if (!passed) {
            failures += 1;
          }

          lines.push(`${passed ? "PASS" : "FAIL"} ${input}\n  expected: ${expected}\n  actual:   ${actual}`);
        } catch (error) {
          failures += 1;
          lines.push(`FAIL ${input}\n  threw: ${error.message}`);
        }
      }

      for (const [input, expectedMessage] of errorTests) {
        try {
          const actual = typstMathToLatex(input);
          failures += 1;
          lines.push(`FAIL ${input}\n  expected error containing: ${expectedMessage}\n  actual:   ${actual}`);
        } catch (error) {
          const passed = error.message.includes(expectedMessage);

          if (!passed) {
            failures += 1;
          }

          lines.push(`${passed ? "PASS" : "FAIL"} ${input}\n  expected error containing: ${expectedMessage}\n  actual error: ${error.message}`);
        }
      }

      const summary = document.getElementById("summary");
      summary.className = failures === 0 ? "pass" : "fail";
      summary.textContent = failures === 0
        ? `All ${tests.length + errorTests.length} tests passed.`
        : `${failures} of ${tests.length + errorTests.length} tests failed.`;
      document.getElementById("results").textContent = lines.join("\n\n");
    </script>
  </body>
</html>
